<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptPro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="popup__header">
      <div class="popup__logo">✨</div>
      <div class="popup__title">
        <h1>PromptPro</h1>
        <p class="popup__subtitle">Upgrade your prompts</p>
      </div>
      <label class="popup__toggle">
        <input type="checkbox" id="enabled-toggle" checked>
        <span class="popup__toggle-slider"></span>
      </label>
    </header>

    <section class="popup__section">
      <h2 class="popup__section-title">Default Strategy</h2>
      <div class="popup__strategies" id="strategy-selector">
        <button class="popup__strategy popup__strategy--active" data-strategy="enhance">
          <span class="popup__strategy-icon">🚀</span>
          <span class="popup__strategy-label">Enhance</span>
        </button>
        <button class="popup__strategy" data-strategy="elaborate">
          <span class="popup__strategy-icon">📝</span>
          <span class="popup__strategy-label">Elaborate</span>
        </button>
        <button class="popup__strategy" data-strategy="concise">
          <span class="popup__strategy-icon">⚡</span>
          <span class="popup__strategy-label">Concise</span>
        </button>
      </div>
    </section>

    <section class="popup__section">
      <h2 class="popup__section-title">Default Tone</h2>
      <div class="popup__dropdown" id="tone-selector" tabindex="0">
        <div class="popup__dropdown-trigger">
          <span class="popup__dropdown-value" id="tone-display">None</span>
          <svg class="popup__dropdown-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
        <div class="popup__dropdown-menu">
          <div class="popup__dropdown-item popup__dropdown-item--active" data-tone="none">
            <span>None</span><svg class="popup__dropdown-check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <div class="popup__dropdown-item" data-tone="professional">
            <span>Professional</span><svg class="popup__dropdown-check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <div class="popup__dropdown-item" data-tone="casual">
            <span>Casual</span><svg class="popup__dropdown-check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <div class="popup__dropdown-item" data-tone="academic">
            <span>Academic</span><svg class="popup__dropdown-check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <div class="popup__dropdown-item" data-tone="creative">
            <span>Creative</span><svg class="popup__dropdown-check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <div class="popup__dropdown-item" data-tone="technical">
            <span>Technical</span><svg class="popup__dropdown-check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <div class="popup__dropdown-item" data-tone="direct">
            <span>Direct</span><svg class="popup__dropdown-check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
        </div>
      </div>
    </section>

    <section class="popup__section">
      <h2 class="popup__section-title">Options</h2>
      <div class="popup__option" id="score-option-container">
        <span>Show score badge</span>
        <label class="popup__switch">
          <input type="checkbox" id="score-toggle" checked>
          <span class="popup__switch-border"></span>
          <span class="popup__switch-track">
            <span class="popup__switch-thumb"></span>
          </span>
        </label>
      </div>
    </section>

    <footer class="popup__footer">
      <div class="popup__sites">
        <span class="popup__site-badge">ChatGPT</span>
        <span class="popup__site-badge">Claude</span>
        <span class="popup__site-badge">Gemini</span>
      </div>
      <p class="popup__privacy">🔒 100% local — your prompts never leave your browser</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
